<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Finanze | Умные финансы</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ВКЛАДКА 1: СЧЕТА -->
    <div id="accountsView" class="view active">
        <div class="app-container">
            <header class="header">
                <h1><i class="fas fa-piggy-bank"></i> Мои Счета</h1>
                <div class="balance-card">
                    <span>Общий рабочий баланс</span>
                    <h2 id="totalBalance">0.00 ₽</h2>
                </div>
            </header>
            <div class="card">
                <h3><i class="fas fa-wallet"></i> Ваши счета</h3>
                <ul id="accountsList" class="accounts-list"></ul>
                <button class="btn-add-account" id="addAccountBtn">
                    <i class="fas fa-plus-circle"></i> Добавить счет
                </button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА 2: РАСХОДЫ -->
    <div id="expensesView" class="view">
        <div class="app-container">
            <header class="header">
                <h1><i class="fas fa-shopping-cart"></i> Расходы</h1>
                <div class="balance-card expense-card">
                    <span id="periodLabel">Расход за месяц</span>
                    <h2 id="periodTotal">0.00 ₽</h2>
                </div>
            </header>
            
            <div class="card">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="month"><i class="fas fa-calendar-alt"></i> Месяц</button>
                    <button class="filter-btn" data-filter="week"><i class="fas fa-clock"></i> Неделя</button>
                    <button class="filter-btn" data-filter="today"><i class="fas fa-sun"></i> Сегодня</button>
                </div>            </div>

            <div class="card">
                <h3><i class="fas fa-plus"></i> Добавить расход</h3>
                <div class="input-group">
                    <select id="accountSelect"></select>
                    <input type="number" id="amountInput" placeholder="Сумма (₽)" step="0.01">
                    <input list="categoriesList" id="categoryInput" placeholder="Категория">
                    <datalist id="categoriesList">
                        <option value="🛒 Продукты">
                        <option value="🚕 Транспорт">
                        <option value="🍔 Кафе">
                        <option value="💊 Здоровье">
                        <option value="🛍️ Покупки">
                        <option value="🏠 Дом">
                        <option value="📦 Другое">
                    </datalist>
                    <input type="text" id="descInput" placeholder="Описание (например: Пятерочка)">
                    <button class="btn-add btn-expense" id="addBtn">
                        <i class="fas fa-paper-plane"></i> Записать
                    </button>
                </div>
            </div>

            <div class="card">
                <h3><i class="fas fa-history"></i> История операций</h3>
                <ul id="transactionList" class="transaction-list"></ul>
                <p id="emptyState" class="empty-state">
                    <i class="far fa-folder-open"></i> Нет операций за этот период
                </p>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА 3: ДОХОДЫ -->
    <div id="incomeView" class="view">
        <div class="app-container">
            <header class="header">
                <h1><i class="fas fa-arrow-up"></i> Доходы</h1>
                <div class="balance-card income-card">
                    <span>Доход за месяц</span>
                    <h2 id="monthIncomeTotal">0.00 ₽</h2>
                </div>
            </header>
            <div class="card">
                <h3><i class="fas fa-plus"></i> Добавить доход</h3>
                <div class="input-group">
                    <select id="incomeAccountSelect"></select>
                    <input type="number" id="incomeAmountInput" placeholder="Сумма (₽)" step="0.01">
                    <input type="text" id="incomeDescInput" placeholder="Описание (например: Зарплата)">                    <button class="btn-add btn-income" id="addIncomeBtn">
                        <i class="fas fa-money-bill-wave"></i> Зачислить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-view="accountsView">
            <i class="fas fa-home"></i>
            <span>Счета</span>
        </button>
        <button class="nav-btn" data-view="expensesView">
            <i class="fas fa-chart-bar"></i>
            <span>Расходы</span>
        </button>
        <button class="nav-btn" data-view="incomeView">
            <i class="fas fa-hand-holding-usd"></i>
            <span>Доходы</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
